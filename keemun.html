<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keemun</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-strong: #eef1f4;
      --ink: #172026;
      --muted: #5b6770;
      --line: #d8dee4;
      --accent: #0f766e;
      --constraint: #6554c0;
      --decision: #0f766e;
      --option: #b45309;
      --question: #2563eb;
      --outcome: #475569;
      --negative: #b42318;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      min-height: 100vh;
    }
    header {
      position: absolute;
      inset: 0 380px auto 0;
      height: 72px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      z-index: 2;
      pointer-events: none;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .summary {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      max-width: 760px;
    }
    .workspace {
      position: relative;
      min-height: 100vh;
      padding-top: 72px;
    }
    .toolbar {
      position: absolute;
      top: 18px;
      right: 24px;
      display: flex;
      gap: 8px;
      z-index: 3;
    }
    input, textarea, button, select {
      font: inherit;
    }
    .search {
      width: min(320px, 46vw);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
    }
    button:hover { border-color: #aab4be; }
    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    #graph-svg {
      display: block;
      width: 100%;
      height: calc(100vh - 72px);
      min-height: 520px;
    }
    .edge {
      stroke: #88939d;
      stroke-width: 1.6;
      marker-end: url(#arrow);
    }
    .edge.negative {
      stroke: var(--negative);
      stroke-dasharray: 6 5;
    }
    .edge-label {
      fill: var(--muted);
      font-size: 11px;
      pointer-events: none;
    }
    .node circle {
      stroke: #fff;
      stroke-width: 3;
      filter: drop-shadow(0 4px 10px rgba(23, 32, 38, 0.18));
    }
    .node text {
      fill: var(--ink);
      font-size: 12px;
      text-anchor: middle;
      pointer-events: none;
    }
    .node.active circle {
      stroke: #111827;
      stroke-width: 4;
    }
    aside {
      min-height: 100vh;
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 20px;
      overflow: auto;
    }
    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 8px;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .panel-section {
      border-top: 1px solid var(--line);
      padding-top: 16px;
      margin-top: 16px;
    }
    .muted {
      color: var(--muted);
    }
    .pill-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      color: var(--muted);
      background: var(--panel-strong);
    }
    .edge-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .edge-button {
      width: 100%;
      text-align: left;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px;
      line-height: 1.35;
    }
    .edge-button strong {
      display: block;
      color: var(--ink);
      margin-bottom: 2px;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f2f4f7;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      line-height: 1.45;
      max-height: 360px;
      overflow: auto;
    }
    .editor {
      display: none;
    }
    .editor.enabled {
      display: block;
    }
    #json-editor {
      width: 100%;
      min-height: 360px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }
    .editor-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    #save-status {
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }
      header {
        position: static;
        height: auto;
        padding-right: 16px;
      }
      .workspace {
        min-height: 560px;
        padding-top: 0;
      }
      .toolbar {
        position: static;
        padding: 0 16px 10px;
      }
      .search {
        width: 100%;
      }
      #graph-svg {
        height: 560px;
        min-height: 560px;
      }
      aside {
        min-height: auto;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="workspace">
      <header>
        <div>
          <h1>Keemun</h1>
          <p class="summary">A decision graph for architectural documentation.</p>
        </div>
      </header>
      <div class="toolbar">
        <input id="search" class="search" type="search" placeholder="Search nodes">
        <button id="fit-button" type="button">Fit</button>
      </div>
      <svg id="graph-svg" role="img" aria-label="Keemun decision graph"></svg>
    </main>
    <aside>
      <section id="details"></section>
      <section class="panel-section">
        <p class="eyebrow">Generated rationale</p>
        <pre id="trace">Select a node to generate the path rationale.</pre>
      </section>
      <section id="editor-section" class="panel-section editor">
        <p class="eyebrow">Graph JSON</p>
        <textarea id="json-editor" spellcheck="false"></textarea>
        <div class="editor-actions">
          <button id="save-json" type="button" class="primary">Save</button>
          <button id="reload-json" type="button">Reload</button>
          <span id="save-status"></span>
        </div>
      </section>
    </aside>
  </div>
  <script type="application/json" id="graph-data">{
  "schema_version": 1,
  "metadata": {
    "summary": "A decision graph for architectural documentation."
  },
  "nodes": [
    {
      "id": "compile-time-framework",
      "type": "decision",
      "title": "Build a compile-time framework",
      "summary": "Generate framework wiring before runtime so failures surface earlier and startup stays predictable.",
      "tags": [
        "architecture",
        "performance"
      ]
    },
    {
      "id": "framework-code",
      "type": "decision",
      "title": "Use a framework boundary",
      "summary": "Keep application code scalable and testable by centralizing conventions in a framework layer.",
      "tags": [
        "architecture"
      ]
    },
    {
      "id": "kotlin-language",
      "type": "constraint",
      "title": "Kotlin is the implementation language",
      "summary": "The project is written in Kotlin, so integration points should fit Kotlin tooling and idioms.",
      "tags": [
        "external"
      ],
      "external": true
    },
    {
      "id": "ksp",
      "type": "decision",
      "title": "Use KSP for compile-time integration",
      "summary": "KSP provides a Kotlin-native symbol processing API for code generation.",
      "tags": [
        "tooling"
      ]
    },
    {
      "id": "runtime-reflection",
      "type": "option",
      "title": "Runtime reflection",
      "summary": "A rejected implementation option that discovers wiring while the application starts.",
      "status": "rejected",
      "tags": [
        "alternative"
      ]
    }
  ],
  "edges": [
    {
      "id": "kotlin-enables-framework",
      "source": "kotlin-language",
      "target": "framework-code",
      "type": "enables",
      "rationale": "Kotlin gives enough type-system support and compiler tooling to express framework contracts without hiding application behavior.",
      "weight": 0.74,
      "order": 1,
      "criteria": [
        "language-fit",
        "testability"
      ]
    },
    {
      "id": "framework-enables-compile-time",
      "source": "framework-code",
      "target": "compile-time-framework",
      "type": "enables",
      "rationale": "A framework boundary creates a small set of conventions that can be checked and generated ahead of runtime.",
      "weight": 0.82,
      "order": 2,
      "criteria": [
        "startup",
        "testability"
      ]
    },
    {
      "id": "kotlin-constrains-ksp",
      "source": "kotlin-language",
      "target": "ksp",
      "type": "constrains",
      "rationale": "Because Kotlin is fixed externally, the generation mechanism should understand Kotlin symbols without falling back to Java-only annotation processing.",
      "weight": 0.9,
      "order": 3,
      "criteria": [
        "language-fit"
      ]
    },
    {
      "id": "compile-time-enables-ksp",
      "source": "compile-time-framework",
      "target": "ksp",
      "type": "enables",
      "rationale": "Once framework wiring is moved to compile time, a symbol processor is needed to inspect Kotlin declarations and generate code.",
      "weight": 0.86,
      "order": 4,
      "criteria": [
        "maintainability",
        "tooling-fit"
      ]
    },
    {
      "id": "runtime-conflicts-compile-time",
      "source": "runtime-reflection",
      "target": "compile-time-framework",
      "type": "conflicts",
      "rationale": "Runtime discovery was considered, but it moves wiring mistakes to execution time and can slow cold start, so it conflicts with the chosen compile-time direction.",
      "status": "rejected",
      "polarity": "negative",
      "weight": 0.93,
      "order": 5,
      "criteria": [
        "correctness",
        "startup"
      ]
    }
  ]
}</script>
  <script>
    const editorEnabled = false;
    const colors = {
      constraint: '#6554c0',
      decision: '#0f766e',
      option: '#b45309',
      question: '#2563eb',
      outcome: '#475569'
    };
    let graph = JSON.parse(document.getElementById('graph-data').textContent);
    let selectedId = graph.nodes.length > 0 ? graph.nodes[0].id : null;

    function sortedEdges(edges) {
      return edges.slice().sort(function(a, b) {
        const orderA = a.order || 999999;
        const orderB = b.order || 999999;
        if (orderA !== orderB) return orderA - orderB;
        return a.id.localeCompare(b.id);
      });
    }

    function nodeById(id) {
      return graph.nodes.find(function(node) { return node.id === id; });
    }

    function incoming(id) {
      return sortedEdges(graph.edges.filter(function(edge) { return edge.target === id; }));
    }

    function outgoing(id) {
      return sortedEdges(graph.edges.filter(function(edge) { return edge.source === id; }));
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, function(char) {
        return {'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[char];
      });
    }

    function short(value, max) {
      value = String(value || '');
      return value.length > max ? value.slice(0, max - 1) + '...' : value;
    }

    function layoutNodes(width, height) {
      const buckets = {constraint: [], question: [], decision: [], option: [], outcome: []};
      graph.nodes.forEach(function(node) {
        (buckets[node.type] || buckets.decision).push(node);
      });
      const lanes = [
        {items: buckets.constraint, x: width * 0.18},
        {items: buckets.question, x: width * 0.34},
        {items: buckets.decision, x: width * 0.52},
        {items: buckets.option, x: width * 0.70},
        {items: buckets.outcome, x: width * 0.84}
      ];
      const positions = {};
      lanes.forEach(function(lane) {
        const count = Math.max(lane.items.length, 1);
        lane.items.forEach(function(node, index) {
          const y = height * ((index + 1) / (count + 1));
          positions[node.id] = {x: lane.x, y: y};
        });
      });
      return positions;
    }

    function draw() {
      const svg = document.getElementById('graph-svg');
      const width = Math.max(svg.clientWidth || 900, 680);
      const height = Math.max(svg.clientHeight || 520, 520);
      const positions = layoutNodes(width, height);
      svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
      svg.innerHTML = '<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#88939d"></path></marker></defs>';

      sortedEdges(graph.edges).forEach(function(edge) {
        const source = positions[edge.source];
        const target = positions[edge.target];
        if (!source || !target) return;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', source.x);
        line.setAttribute('y1', source.y);
        line.setAttribute('x2', target.x);
        line.setAttribute('y2', target.y);
        line.setAttribute('class', 'edge ' + (edge.polarity === 'negative' ? 'negative' : ''));
        svg.appendChild(line);

        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', (source.x + target.x) / 2);
        label.setAttribute('y', (source.y + target.y) / 2 - 6);
        label.setAttribute('class', 'edge-label');
        label.textContent = edge.type + ' ' + (edge.weight || 1);
        svg.appendChild(label);
      });

      graph.nodes.forEach(function(node) {
        const position = positions[node.id];
        if (!position) return;
        const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        group.setAttribute('class', 'node ' + (node.id === selectedId ? 'active' : ''));
        group.setAttribute('tabindex', '0');
        group.setAttribute('role', 'button');
        group.setAttribute('aria-label', node.title);
        group.addEventListener('click', function() { selectNode(node.id); });
        group.addEventListener('keydown', function(event) {
          if (event.key === 'Enter' || event.key === ' ') selectNode(node.id);
        });

        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', position.x);
        circle.setAttribute('cy', position.y);
        circle.setAttribute('r', node.type === 'constraint' ? 28 : 32);
        circle.setAttribute('fill', colors[node.type] || colors.decision);
        group.appendChild(circle);

        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', position.x);
        label.setAttribute('y', position.y + 50);
        label.textContent = short(node.title, 28);
        group.appendChild(label);
        svg.appendChild(group);
      });
    }

    function edgeButton(edge, otherNode, direction) {
      const targetTitle = otherNode ? otherNode.title : direction;
      return '<button type="button" class="edge-button" data-node="' + escapeHtml(otherNode ? otherNode.id : '') + '">' +
        '<strong>' + escapeHtml(edge.type + ' ' + targetTitle) + '</strong>' +
        '<span class="muted">' + escapeHtml(short(edge.rationale, 140)) + '</span>' +
        '</button>';
    }

    function selectNode(id) {
      selectedId = id;
      const node = nodeById(id);
      if (!node) return;
      const tags = (node.tags || []).map(function(tag) { return '<span class="pill">' + escapeHtml(tag) + '</span>'; }).join('');
      const incomingHtml = incoming(id).map(function(edge) { return edgeButton(edge, nodeById(edge.source), 'source'); }).join('');
      const outgoingHtml = outgoing(id).map(function(edge) { return edgeButton(edge, nodeById(edge.target), 'target'); }).join('');
      document.getElementById('details').innerHTML =
        '<p class="eyebrow">' + escapeHtml(node.type + ' / ' + (node.status || 'accepted')) + '</p>' +
        '<h2>' + escapeHtml(node.title) + '</h2>' +
        '<p class="muted">' + escapeHtml(node.summary || 'No summary recorded.') + '</p>' +
        '<div class="pill-row">' + tags + '</div>' +
        '<div class="panel-section"><p class="eyebrow">Incoming</p><div class="edge-list">' + (incomingHtml || '<p class="muted">No incoming relationships.</p>') + '</div></div>' +
        '<div class="panel-section"><p class="eyebrow">Outgoing</p><div class="edge-list">' + (outgoingHtml || '<p class="muted">No outgoing relationships.</p>') + '</div></div>';
      document.querySelectorAll('.edge-button').forEach(function(button) {
        button.addEventListener('click', function() {
          const nextId = button.getAttribute('data-node');
          if (nextId) selectNode(nextId);
        });
      });
      document.getElementById('trace').textContent = explain(id);
      draw();
    }

    function explain(id) {
      const node = nodeById(id);
      const lines = [];
      const seen = {};
      lines.push(node.type + ': ' + node.title);
      if (node.summary) lines.push(node.summary);
      lines.push('');
      lines.push('How this node was reached:');
      appendIncoming(id, 0, seen, lines);
      return lines.join('\n');
    }

    function appendIncoming(id, depth, seen, lines) {
      const edges = incoming(id);
      if (edges.length === 0 && depth === 0) {
        lines.push('- No incoming rationale recorded.');
        return;
      }
      edges.forEach(function(edge) {
        const source = nodeById(edge.source);
        const target = nodeById(edge.target);
        if (seen[edge.id]) {
          lines.push('  '.repeat(depth) + '- ' + edge.id + ' closes a cycle already described.');
          return;
        }
        seen[edge.id] = true;
        lines.push('  '.repeat(depth) + '- ' + source.title + ' ' + edge.type + ' ' + target.title + ' [' + (edge.polarity || 'positive') + ', weight ' + (edge.weight || 1) + ']');
        lines.push('  '.repeat(depth) + '  Rationale: ' + edge.rationale);
        appendIncoming(source.id, depth + 1, seen, lines);
      });
    }

    function setupSearch() {
      const search = document.getElementById('search');
      search.addEventListener('input', function() {
        const query = search.value.trim().toLowerCase();
        if (!query) return;
        const node = graph.nodes.find(function(candidate) {
          return candidate.id.toLowerCase().includes(query) || candidate.title.toLowerCase().includes(query);
        });
        if (node) selectNode(node.id);
      });
    }

    function setupEditor() {
      const section = document.getElementById('editor-section');
      if (!editorEnabled) return;
      section.classList.add('enabled');
      const textarea = document.getElementById('json-editor');
      const status = document.getElementById('save-status');
      function syncEditor() {
        textarea.value = JSON.stringify(graph, null, 2) + '\n';
      }
      syncEditor();
      document.getElementById('reload-json').addEventListener('click', function() {
        fetch('/api/graph').then(function(response) { return response.json(); }).then(function(nextGraph) {
          graph = nextGraph;
          selectedId = graph.nodes.length > 0 ? graph.nodes[0].id : null;
          syncEditor();
          selectNode(selectedId);
          status.textContent = 'Reloaded';
        }).catch(function(error) {
          status.textContent = error.message;
        });
      });
      document.getElementById('save-json').addEventListener('click', function() {
        status.textContent = 'Saving...';
        fetch('/api/graph', {
          method: 'PUT',
          headers: {'content-type': 'application/json'},
          body: textarea.value
        }).then(function(response) {
          if (!response.ok) {
            return response.text().then(function(text) { throw new Error(text); });
          }
          return response.json();
        }).then(function(nextGraph) {
          graph = nextGraph;
          syncEditor();
          selectedId = selectedId && nodeById(selectedId) ? selectedId : (graph.nodes[0] ? graph.nodes[0].id : null);
          if (selectedId) selectNode(selectedId);
          status.textContent = 'Saved';
        }).catch(function(error) {
          status.textContent = error.message;
        });
      });
    }

    document.getElementById('fit-button').addEventListener('click', draw);
    window.addEventListener('resize', draw);
    setupSearch();
    setupEditor();
    draw();
    if (selectedId) selectNode(selectedId);
  </script>
</body>
</html>
